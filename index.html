<!DOCTYPE html>
<html>
<head>
    <title>70 Million Counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>70 Million Counter</h1>

<div id="counter">
    <span id="current">0</span> / 70,000,000
</div>

<div class="buttons">
    <button onclick="addCount(1)">+1</button>
    <button onclick="addCount(100)">+100</button>
    <button onclick="addCount(1000)">+1000</button>
</div>

<script src="script.js"></script>

</body>
</html>
